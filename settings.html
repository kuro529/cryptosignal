<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚙️ 設定</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #07070f; color: #dde; font-family: -apple-system, sans-serif; min-height: 100vh; padding-bottom: 48px; }
.header { display: flex; justify-content: space-between; align-items: center; padding: 18px 16px; border-bottom: 1px solid #12121f; position: sticky; top: 0; background: #07070f; z-index: 100; }
.title { font-size: 18px; font-weight: 800; color: #fff; }
.btn { padding: 6px 14px; border-radius: 8px; border: 1px solid #00e5a044; background: #00e5a010; color: #00e5a0; cursor: pointer; font-size: 13px; text-decoration: none; display: inline-block; }
.section { padding: 16px; border-bottom: 1px solid #12121f; }
.section-title { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 12px; }
.row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.row label { flex: 1; font-size: 12px; color: #888; }
.row input { width: 90px; background: #0d0d1a; border: 1px solid #222236; color: #ccc; border-radius: 6px; padding: 6px 8px; font-size: 13px; text-align: right; }
.save-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #0d0d1a; border-top: 1px solid #222236; padding: 12px 16px; display: flex; gap: 10px; }
.save-bar .btn { flex: 1; text-align: center; padding: 10px; font-size: 14px; }
.btn-save { background: #00e5a0; color: #000; border: none; }
.btn-reset { background: #ff4d6d10; color: #ff4d6d; border: 1px solid #ff4d6d44; }
</style>
</head>
<body>
<div class="header">
  <div class="title">⚙️ 設定</div>
  <a href="index.html" class="btn">← 戻る</a>
</div>

<div class="section">
  <div class="section-title">RSI</div>
  <div class="row"><label>RSI高値1 閾値</label><input type="number" id="rsiHigh1" step="1"></div>
  <div class="row"><label>RSI高値1 点数</label><input type="number" id="rsiHigh1Score" step="0.5"></div>
  <div class="row"><label>RSI高値2 閾値</label><input type="number" id="rsiHigh2" step="1"></div>
  <div class="row"><label>RSI高値2 点数</label><input type="number" id="rsiHigh2Score" step="0.5"></div>
  <div class="row"><label>RSI低値1 閾値</label><input type="number" id="rsiLow1" step="1"></div>
  <div class="row"><label>RSI低値1 点数</label><input type="number" id="rsiLow1Score" step="0.5"></div>
  <div class="row"><label>RSI低値2 閾値</label><input type="number" id="rsiLow2" step="1"></div>
  <div class="row"><label>RSI低値2 点数</label><input type="number" id="rsiLow2Score" step="0.5"></div>
  <div class="row"><label>平均/前回比較 点数</label><input type="number" id="rsiTrendScore" step="0.5"></div>
</div>

<div class="section">
  <div class="section-title">BB（ボリンジャーバンド）</div>
  <div class="row"><label>下限タッチ 点数</label><input type="number" id="bbLowerScore" step="0.5"></div>
  <div class="row"><label>上限タッチ 点数</label><input type="number" id="bbUpperScore" step="0.5"></div>
  <div class="row"><label>中央より上 点数</label><input type="number" id="bbMidUpScore" step="0.1"></div>
  <div class="row"><label>中央より下 点数</label><input type="number" id="bbMidDownScore" step="0.1"></div>
  <div class="row"><label>上限クロス(下抜け) 点数</label><input type="number" id="bbCrossUpperScore" step="0.5"></div>
  <div class="row"><label>下限クロス(上抜け) 点数</label><input type="number" id="bbCrossLowerScore" step="0.5"></div>
  <div class="row"><label>中央クロス(上抜け) 点数</label><input type="number" id="bbCrossMidUpScore" step="0.5"></div>
  <div class="row"><label>中央クロス(下抜け) 点数</label><input type="number" id="bbCrossMidDownScore" step="0.5"></div>
</div>

<div class="section">
  <div class="section-title">MACD</div>
  <div class="row"><label>DIF>0&gt;Sig 拡大 点数</label><input type="number" id="macd1" step="0.5"></div>
  <div class="row"><label>DIF>0&gt;Sig 縮小 点数</label><input type="number" id="macd2" step="0.5"></div>
  <div class="row"><label>DIF>0≤Sig 点数</label><input type="number" id="macd3" step="0.5"></div>
  <div class="row"><label>DIF≤0>Sig 点数</label><input type="number" id="macd4" step="0.5"></div>
  <div class="row"><label>DIF≤0≤Sig 縮小 点数</label><input type="number" id="macd5" step="0.5"></div>
  <div class="row"><label>DIF≤0≤Sig 拡大 点数</label><input type="number" id="macd6" step="0.5"></div>
</div>

<div class="section">
  <div class="section-title">資金調達率</div>
  <div class="row"><label>高値1 閾値</label><input type="number" id="frHigh1" step="0.001"></div>
  <div class="row"><label>高値1 点数</label><input type="number" id="frHigh1Score" step="0.5"></div>
  <div class="row"><label>高値2 閾値</label><input type="number" id="frHigh2" step="0.0001"></div>
  <div class="row"><label>高値2 点数</label><input type="number" id="frHigh2Score" step="0.5"></div>
  <div class="row"><label>低値1 閾値</label><input type="number" id="frLow1" step="0.001"></div>
  <div class="row"><label>低値1 点数</label><input type="number" id="frLow1Score" step="0.5"></div>
  <div class="row"><label>低値2 閾値</label><input type="number" id="frLow2" step="0.0001"></div>
  <div class="row"><label>低値2 点数</label><input type="number" id="frLow2Score" step="0.5"></div>
  <div class="row"><label>低値3 閾値</label><input type="number" id="frLow3" step="0.00001"></div>
  <div class="row"><label>低値3 点数</label><input type="number" id="frLow3Score" step="0.5"></div>
</div>

<div class="section">
  <div class="section-title">シグナル閾値</div>
  <div class="row"><label>弱</label><input type="number" id="thWeak" step="0.5"></div>
  <div class="row"><label>中</label><input type="number" id="thMid" step="0.5"></div>
  <div class="row"><label>強</label><input type="number" id="thStrong" step="0.5"></div>
</div>

<div style="height:70px"></div>

<div class="save-bar">
  <button class="btn btn-reset" onclick="resetAll()">リセット</button>
  <button class="btn btn-save" onclick="saveAll()">保存</button>
</div>

<script>
var SETTINGS_DEFAULT = {
  rsiHigh1:85, rsiHigh1Score:-2,
  rsiHigh2:70, rsiHigh2Score:-1,
  rsiLow1:15, rsiLow1Score:2,
  rsiLow2:30, rsiLow2Score:1,
  rsiTrendScore:2,
  bbLowerScore:2, bbUpperScore:-2, bbMidUpScore:0.5, bbMidDownScore:-0.5,
  bbCrossUpperScore:-2, bbCrossLowerScore:2, bbCrossMidUpScore:1, bbCrossMidDownScore:-1,
  macd1:3, macd2:2, macd3:1, macd4:-1, macd5:-2, macd6:-3,
  frHigh1:0.01, frHigh1Score:-2,
  frHigh2:0.0001, frHigh2Score:-1,
  frLow1:-0.01, frLow1Score:2,
  frLow2:-0.0001, frLow2Score:1.5,
  frLow3:-0.00005, frLow3Score:1,
  thWeak:3.5, thMid:5.5, thStrong:7.5
};

var SETTINGS = JSON.parse(JSON.stringify(SETTINGS_DEFAULT));
try {
  var saved = localStorage.getItem("appSettings");
  if (saved) {
    var parsed = JSON.parse(saved);
    for (var k in parsed) SETTINGS[k] = parsed[k];
  }
} catch(e) {}

function loadValues() {
  for (var key in SETTINGS_DEFAULT) {
    var el = document.getElementById(key);
    if (el) el.value = SETTINGS[key];
  }
}

function saveAll() {
  var newSettings = {};
  for (var key in SETTINGS_DEFAULT) {
    var el = document.getElementById(key);
    if (el) {
      var v = parseFloat(el.value);
      newSettings[key] = isNaN(v) ? SETTINGS_DEFAULT[key] : v;
    }
  }
  try {
    localStorage.setItem("appSettings", JSON.stringify(newSettings));
    alert("設定を保存しました");
    window.location.href = "index.html";
  } catch(e) {
    alert("保存に失敗しました");
  }
}

function resetAll() {
  if (confirm("すべての設定をデフォルトに戻しますか？")) {
    try { localStorage.setItem("appSettings", JSON.stringify(SETTINGS_DEFAULT)); } catch(e) {}
    SETTINGS = JSON.parse(JSON.stringify(SETTINGS_DEFAULT));
    loadValues();
  }
}

loadValues();
</script>
</body>
</html>
