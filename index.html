<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ CryptoSignal</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #07070f; color: #dde; font-family: -apple-system, sans-serif; min-height: 100vh; padding-bottom: 48px; }
.header { display: flex; justify-content: space-between; align-items: flex-start; padding: 18px 16px 12px; border-bottom: 1px solid #12121f; flex-wrap: wrap; gap: 10px; }
.title { font-size: 20px; font-weight: 800; color: #fff; }
.subtitle { font-size: 11px; color: #383848; margin-top: 3px; }
.controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
select { background: #0d0d1a; border: 1px solid #222236; color: #aaa; border-radius: 7px; padding: 5px 10px; font-size: 13px; }
.btn { padding: 6px 14px; border-radius: 8px; border: 1px solid #00e5a044; background: #00e5a010; color: #00e5a0; cursor: pointer; font-size: 13px; }
.btn-notif { padding: 6px 14px; border-radius: 8px; border: 1px solid #5577ff44; background: #5577ff10; color: #5577ff; cursor: pointer; font-size: 13px; }
.btn-notif.on { background: #5577ff30; border-color: #5577ff; }
.add-bar { display: flex; gap: 8px; padding: 10px 16px; background: #0d0d1a; border-bottom: 1px solid #12121f; align-items: center; flex-wrap: wrap; }
.add-bar input { flex: 1; min-width: 120px; background: #07070f; border: 1px solid #222236; color: #ccc; border-radius: 7px; padding: 6px 12px; font-size: 13px; }
.popular { display: flex; gap: 6px; flex-wrap: wrap; padding: 8px 16px; border-bottom: 1px solid #0f0f1c; }
.popular-btn { padding: 4px 10px; border-radius: 6px; border: 1px solid #222236; background: transparent; color: #666; cursor: pointer; font-size: 12px; }
.popular-btn.active { border-color: #00e5a044; color: #00e5a0; background: #00e5a010; }
.legend { display: flex; gap: 12px; padding: 8px 16px; font-size: 12px; border-bottom: 1px solid #0f0f1c; flex-wrap: wrap; align-items: center; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; padding: 14px 16px; }
.card { background: #0d0d1a; border: 1px solid #12121f; border-radius: 14px; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; }
.pair-name { font-weight: 700; font-size: 16px; color: #fff; }
.price { font-weight: 700; font-size: 20px; color: #fff; font-variant-numeric: tabular-nums; }
.x-btn { background: none; border: none; color: #2a2a44; cursor: pointer; font-size: 16px; }
.badge { border-radius: 9px; padding: 9px 12px; display: flex; align-items: center; flex-wrap: wrap; gap: 4px; }
.badge-type { font-weight: 800; font-size: 16px; }
.badge-strength { border-radius: 4px; padding: 1px 6px; font-size: 10px; font-weight: 700; }
.badge-reason { font-size: 11px; opacity: 0.8; }
.rsi-labels { display: flex; justify-content: space-between; font-size: 11px; color: #555; margin-bottom: 3px; }
.rsi-track { background: #1a1a2e; border-radius: 4px; height: 6px; overflow: hidden; }
.rsi-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }
.rsi-desc { display: flex; justify-content: space-between; font-size: 10px; color: #333; margin-top: 2px; }
.bb-grid { display: flex; flex-direction: column; gap: 4px; }
.bb-row { display: flex; justify-content: space-between; border-bottom: 1px solid #0f0f1c; padding-bottom: 3px; }
.bb-label { color: #444; font-size: 11px; }
.bb-val { color: #888; font-size: 12px; font-variant-numeric: tabular-nums; }
.hist { border-top: 1px solid #12121f; padding-top: 8px; }
.hist-label { color: #333; font-size: 10px; margin-bottom: 5px; }
.hist-row { display: flex; align-items: center; margin-bottom: 3px; font-size: 11px; gap: 8px; }
.loading { color: #2a2a44; text-align: center; padding: 24px; font-size: 13px; }
.error { color: #ff4d6d; font-size: 12px; }
.footer { text-align: center; color: #222236; font-size: 10px; padding: 16px; }
.hidden { display: none; }
.toast-wrap { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 8px; width: 90%; max-width: 360px; pointer-events: none; }
.toast { border-radius: 12px; padding: 12px 16px; font-size: 13px; box-shadow: 0 4px 24px #0008; animation: slideIn 0.3s ease; pointer-events: auto; }
.toast.buy { background: #00e5a0ee; color: #000; }
.toast.sell { background: #ff4d6dee; color: #fff; }
.toast-pair { font-weight: 800; font-size: 15px; }
.toast-detail { font-size: 12px; margin-top: 2px; opacity: 0.85; }
@keyframes slideIn { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-8px); } }
</style>
</head>
<body>
<div class="toast-wrap" id="toastWrap"></div>
<div class="header">
  <div>
    <div class="title">⚡ CryptoSignal</div>
    <div class="subtitle">BingX リアルタイム RSI x ボリンジャーバンド</div>
  </div>
  <div class="controls">
    <select id="intervalSelect">
      <option value="1m">1m</option>
      <option value="5m">5m</option>
      <option value="15m" selected>15m</option>
      <option value="1h">1h</option>
      <option value="4h">4h</option>
      <option value="1d">1d</option>
    </select>
    <button class="btn-notif" id="notifBtn" onclick="toggleNotif()">🔔 通知 OFF</button>
    <button class="btn" onclick="toggleAdd()">＋ 追加</button>
  </div>
</div>
<div class="add-bar hidden" id="addBar">
  <input id="pairInput" placeholder="例: DOGE-USDT" />
  <button class="btn" onclick="addPairFromInput()">追加</button>
</div>
<div class="popular" id="popularBtns"></div>
<div class="legend">
  <span style="color:#00e5a0">● BUY</span>
  <span style="color:#ff4d6d">● SELL</span>
  <span style="color:#444466">● HOLD</span>
</div>
<div class="grid" id="grid"></div>
<div class="footer">BingX Public API | 投資判断は自己責任でお願いします</div>
<script>
var PROXY = "https://bingx-proxy-v83p.onrender.com";
var POPULAR = ["BTC-USDT","ETH-USDT","XRP-USDT","SOL-USDT","BNB-USDT","DOGE-USDT","ADA-USDT","AVAX-USDT","LINK-USDT","LTC-USDT","H-USDT","VVV-USDT","UAI-USDT","AKT-USDT","ZEC-USDT","XMR-USDT"];
var pairs = ["BTC-USDT","ETH-USDT"];
var timers = {};
var histories = {};
var notifEnabled = false;
var notifPermission = false;

try {
  var saved = localStorage.getItem("pairs2");
  if (saved) pairs = JSON.parse(saved);
} catch(e) {}

function savePairs() {
  try { localStorage.setItem("pairs2", JSON.stringify(pairs)); } catch(e) {}
}

function toggleNotif() {
  if (!notifEnabled) {
    notifEnabled = true;
    document.getElementById("notifBtn").textContent = "🔔 通知 ON";
    document.getElementById("notifBtn").classList.add("on");
    showToast("通知ON", "BUY/SELLシグナルをお知らせします", "buy", 2000);
    if ("Notification" in window) {
      Notification.requestPermission().then(function(p) { notifPermission = p === "granted"; });
    }
  } else {
    notifEnabled = false;
    document.getElementById("notifBtn").textContent = "🔔 通知 OFF";
    document.getElementById("notifBtn").classList.remove("on");
  }
}

function showToast(pair, message, type, duration) {
  duration = duration || 4000;
  var wrap = document.getElementById("toastWrap");
  var toast = document.createElement("div");
  toast.className = "toast " + type;
  toast.innerHTML = "<div class='toast-pair'>⚡ " + pair + "</div><div class='toast-detail'>" + message + "</div>";
  wrap.appendChild(toast);
  setTimeout(function() {
    toast.style.animation = "slideOut 0.3s ease forwards";
    setTimeout(function() { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 300);
  }, duration);
}

function fireSignalNotif(sym, signal, price) {
  if (!notifEnabled) return;
  var msg = signal.type + " " + signal.reason + " @ " + fmtPrice(price);
  showToast(sym.replace("-","/"), msg, signal.type === "BUY" ? "buy" : "sell");
  if (notifPermission) {
    try { new Notification("⚡ " + sym.replace("-","/") + " " + signal.type, { body: msg }); } catch(e) {}
  }
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = signal.type === "BUY" ? 880 : 440;
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    osc.start(); osc.stop(ctx.currentTime + 0.5);
  } catch(e) {}
}

function renderPopular() {
  var wrap = document.getElementById("popularBtns");
  var html = "";
  for (var i = 0; i < POPULAR.length; i++) {
    var p = POPULAR[i];
    var active = pairs.indexOf(p) >= 0 ? "active" : "";
    var label = p.replace("-USDT","");
    html += "<button class='popular-btn " + active + "' onclick='togglePair(\"" + p + "\")'>" + label + "</button>";
  }
  wrap.innerHTML = html;
}

function togglePair(sym) {
  var idx = pairs.indexOf(sym);
  if (idx >= 0) { removePair(sym); }
  else { pairs.push(sym); savePairs(); renderCard(sym); loadCard(sym); renderPopular(); }
}

function toggleAdd() {
  var bar = document.getElementById("addBar");
  if (bar.classList.contains("hidden")) { bar.classList.remove("hidden"); }
  else { bar.classList.add("hidden"); }
}

function addPairFromInput() {
  var input = document.getElementById("pairInput");
  var sym = input.value.toUpperCase().replace("/","-").trim();
  if (!sym) return;
  if (pairs.indexOf(sym) < 0) { pairs.push(sym); savePairs(); renderCard(sym); loadCard(sym); renderPopular(); }
  input.value = "";
  document.getElementById("addBar").classList.add("hidden");
}

function fmtPrice(p) {
  if (p == null) return "-";
  if (p < 1) return p.toFixed(4);
  if (p < 100) return p.toFixed(2);
  return p.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function calcRSI(closes) {
  var period = 14;
  if (closes.length < period + 1) return null;
  var gains = 0, losses = 0;
  for (var i = closes.length - period; i < closes.length; i++) {
    var diff = closes[i] - closes[i-1];
    if (diff > 0) gains += diff; else losses -= diff;
  }
  var ag = gains/period, al = losses/period;
  if (al === 0) return 100;
  return parseFloat((100 - 100/(1 + ag/al)).toFixed(1));
}

function calcBB(closes) {
  var period = 20, mult = 2;
  if (closes.length < period) return null;
  var slice = closes.slice(-period);
  var mean = slice.reduce(function(a,b){return a+b;},0) / period;
  var std = Math.sqrt(slice.reduce(function(a,b){return a+(b-mean)*(b-mean);},0) / period);
  return { upper: parseFloat((mean+mult*std).toFixed(4)), middle: parseFloat(mean.toFixed(4)), lower: parseFloat((mean-mult*std).toFixed(4)) };
}

function getSignal(rsi, bb, price) {
  if (!rsi || !bb || !price) return { type: "HOLD", reason: "データ不足", strength: "-" };
  if (rsi < 30 && price <= bb.lower) return { type: "BUY", reason: "RSI過売(" + rsi + ") + BB下限タッチ", strength: "強" };
  if (rsi < 35 && price < bb.lower) return { type: "BUY", reason: "RSI低水準(" + rsi + ") + BB下限割れ", strength: "中" };
  if (rsi > 70 && price >= bb.upper) return { type: "SELL", reason: "RSI過買(" + rsi + ") + BB上限タッチ", strength: "強" };
  if (rsi > 65 && price > bb.upper) return { type: "SELL", reason: "RSI高水準(" + rsi + ") + BB上限超え", strength: "中" };
  return { type: "HOLD", reason: "RSI: " + rsi + " BB内で推移中", strength: "-" };
}

function renderCard(sym) {
  if (document.getElementById("card-" + sym)) return;
  var div = document.createElement("div");
  div.className = "card"; div.id = "card-" + sym;
  div.innerHTML = "<div class='loading'>⏳ データ取得中...</div>";
  document.getElementById("grid").appendChild(div);
}

function fetchAndUpdate(sym) {
  var interval = document.getElementById("intervalSelect").value;
  var card = document.getElementById("card-" + sym);
  if (!card) return;
  var kUrl = PROXY + "/kline?symbol=" + sym + "&interval=" + interval + "&limit=100";
  var tUrl = PROXY + "/ticker?symbol=" + sym;
  Promise.all([fetch(kUrl), fetch(tUrl)]).then(function(res) {
    return Promise.all([res[0].json(), res[1].json()]);
  }).then(function(data) {
    var kJson = data[0], tJson = data[1];
    var closes = kJson.data.map(function(d){ return parseFloat(Array.isArray(d) ? d[4] : d.close); });
    var td = Array.isArray(tJson.data) ? tJson.data[0] : tJson.data;
var change = parseFloat(String(td.priceChangePercent || td.priceChange || "0").replace("%",""));
    var price = parseFloat(td.lastPrice);
    var rsi = calcRSI(closes);
    var bb = calcBB(closes);
    var signal = getSignal(rsi, bb, price);
    if (!histories[sym]) histories[sym] = [];
    var lastSig = histories[sym][0] ? histories[sym][0].signal.type : null;
    if (signal.type !== "HOLD" && signal.type !== lastSig) fireSignalNotif(sym, signal, price);
    if (signal.type !== "HOLD") {
      histories[sym].unshift({ time: new Date().toLocaleTimeString("ja-JP"), signal: signal, price: price });
      if (histories[sym].length > 8) histories[sym].pop();
    }
    var sigColor = signal.type === "BUY" ? "#00e5a0" : signal.type === "SELL" ? "#ff4d6d" : "#444466";
    var chgColor = change >= 0 ? "#00e5a0" : "#ff4d6d";
    var rsiColor = rsi < 30 ? "#00e5a0" : rsi > 70 ? "#ff4d6d" : "#5577ff";
    var rsiPct = Math.min(100, Math.max(0, rsi || 0));
    var histHtml = "";
    if (histories[sym].length > 0) {
      histHtml = "<div class='hist'><div class='hist-label'>シグナル履歴</div>";
      for (var i = 0; i < histories[sym].length; i++) {
        var h = histories[sym][i];
        var hc = h.signal.type === "BUY" ? "#00e5a0" : "#ff4d6d";
        histHtml += "<div class='hist-row'><span style='color:#444;min-width:64px'>" + h.time + "</span><span style='color:" + hc + ";font-weight:700'>" + h.signal.type + "</span><span style='color:#555'>" + fmtPrice(h.price) + "</span></div>";
      }
      histHtml += "</div>";
    }
    card.innerHTML =
      "<div class='card-header'><div><div class='pair-name'>" + sym.replace("-","/") + "</div><div style='color:" + chgColor + ";font-size:12px'>" + (change>=0?"▲":"▼") + " " + Math.abs(change).toFixed(2) + "% (24h)</div></div><div style='text-align:right'><div class='price'>" + fmtPrice(price) + "</div><button class='x-btn' onclick='removePair(\"" + sym + "\")'>✕</button></div></div>" +
      "<div class='badge' style='background:" + sigColor + "18;border:1px solid " + sigColor + "44;color:" + sigColor + "'><span class='badge-type'>" + signal.type + "</span>" + (signal.strength!=="-"?"<span class='badge-strength' style='background:" + sigColor + "30'>" + signal.strength + "</span>":"") + "<span class='badge-reason'>" + signal.reason + "</span></div>" +
      "<div><div class='rsi-labels'><span>0</span><span style='color:" + rsiColor + "'>RSI " + rsi + "</span><span>100</span></div><div class='rsi-track'><div class='rsi-fill' style='width:" + rsiPct + "%;background:" + rsiColor + "'></div></div><div class='rsi-desc'><span>過売</span><span>中立</span><span>過買</span></div></div>" +
      "<div class='bb-grid'><div class='bb-row'><span class='bb-label'>BB上限</span><span class='bb-val'>" + fmtPrice(bb?bb.upper:null) + "</span></div><div class='bb-row'><span class='bb-label'>BB中央</span><span class='bb-val'>" + fmtPrice(bb?bb.middle:null) + "</span></div><div class='bb-row'><span class='bb-label'>BB下限</span><span class='bb-val'>" + fmtPrice(bb?bb.lower:null) + "</span></div></div>" +
      histHtml;
  }).catch(function(e) {
    card.innerHTML = "<div class='card-header'><span class='pair-name'>" + sym.replace("-","/") + "</span><button class='x-btn' onclick='removePair(\"" + sym + "\")'>✕</button></div><div class='error'>⚠ " + e.message + "</div><button class='btn' onclick='fetchAndUpdate(\"" + sym + "\")'>再試行</button>";
  });
}

function removePair(sym) {
  var idx = pairs.indexOf(sym);
  if (idx >= 0) pairs.splice(idx, 1);
  savePairs();
  if (timers[sym]) { clearInterval(timers[sym]); delete timers[sym]; }
  var card = document.getElementById("card-" + sym);
  if (card) card.parentNode.removeChild(card);
  renderPopular();
}

function loadCard(sym) {
  if (timers[sym]) clearInterval(timers[sym]);
  fetchAndUpdate(sym);
  var ms = {"1m":15000,"5m":20000,"15m":30000,"1h":60000,"4h":120000,"1d":300000};
  var interval = document.getElementById("intervalSelect").value;
  timers[sym] = setInterval(function(){ fetchAndUpdate(sym); }, ms[interval] || 20000);
}

document.getElementById("intervalSelect").addEventListener("change", function() {
  for (var k in timers) clearInterval(timers[k]);
  timers = {};
  for (var i = 0; i < pairs.length; i++) loadCard(pairs[i]);
});

renderPopular();
for (var i = 0; i < pairs.length; i++) { renderCard(pairs[i]); loadCard(pairs[i]); }
</script>
</body>
</html>
